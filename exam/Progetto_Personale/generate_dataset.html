<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rocket Dataset Generator - ML Training Data</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .section {
            margin-bottom: 30px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        input[type="number"],
        select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="number"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #333;
            border: 2px solid #e0e0e0;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #efefef;
        }

        .progress-container {
            display: none;
            margin-top: 20px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #f0f0f0;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s;
        }

        .progress-text {
            color: #666;
            font-size: 14px;
            text-align: center;
        }

        .stats-container {
            display: none;
            background: #f9f9f9;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid #e0e0e0;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .stat-item:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: #666;
            font-weight: 500;
        }

        .stat-value {
            color: #333;
            font-weight: 600;
        }

        .download-buttons {
            display: none;
            gap: 10px;
            margin-top: 20px;
        }

        .download-buttons button {
            flex: 1;
        }

        .alert {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .alert.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .info-box {
            background: #e7f3ff;
            border-left: 4px solid #667eea;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #004085;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Rocket Dataset Generator</h1>
        <p class="subtitle">Generate 10,000 rocket simulations for ML training</p>

        <div class="info-box">
            <strong>Info:</strong> This tool generates a dataset of rocket launch simulations with varying parameters. The data includes launch parameters and flight outcomes suitable for machine learning models.
        </div>

        <div class="alert success" id="alertSuccess"></div>
        <div class="alert error" id="alertError"></div>

        <div class="section">
            <label for="numLaunches">Number of launches to generate:</label>
            <input type="number" id="numLaunches" value="10000" min="100" max="50000" step="100">
        </div>

        <button class="btn-primary" id="btnGenerate" onclick="startGeneration()">
            Generate Dataset
        </button>
        <button class="btn-secondary" id="btnCancel" onclick="cancelGeneration()" style="display: none;">
            Cancel
        </button>

        <div class="progress-container" id="progressContainer">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">0%</div>
        </div>

        <div class="stats-container" id="statsContainer"></div>

        <div class="download-buttons" id="downloadButtons">
            <button class="btn-primary" onclick="downloadMainDataset()">
                📥 Download Main Dataset (CSV)
            </button>
            <button class="btn-primary" onclick="downloadTrajectories()">
                📥 Download Trajectories (CSV)
            </button>
        </div>
    </div>

    <script src="simulation.js"></script>
    <script src="dataset_generator.js"></script>
    <script>
        let generator = null;

        async function startGeneration() {
            const numLaunches = parseInt(document.getElementById('numLaunches').value);

            if (isNaN(numLaunches) || numLaunches < 100) {
                showAlert('error', 'Please enter a valid number of launches (minimum 100)');
                return;
            }

            // UI state
            document.getElementById('btnGenerate').disabled = true;
            document.getElementById('btnCancel').style.display = 'block';
            document.getElementById('progressContainer').style.display = 'block';
            document.getElementById('statsContainer').style.display = 'none';
            document.getElementById('downloadButtons').style.display = 'none';
            hideAlerts();

            // Create generator
            generator = new DatasetGenerator(numLaunches, onProgress);

            try {
                console.log(`Starting dataset generation for ${numLaunches} launches...`);
                const dataset = await generator.generate();

                if (generator.cancelled) {
                    showAlert('error', 'Generation cancelled by user');
                    resetUI();
                    return;
                }

                console.log(`Dataset generated: ${dataset.length} launches`);
                
                // Show stats
                showStats();
                
                // Show download buttons
                document.getElementById('downloadButtons').style.display = 'flex';
                
                showAlert('success', `✅ Dataset generated successfully! ${numLaunches} launches processed.`);
            } catch (error) {
                console.error('Generation error:', error);
                showAlert('error', `Error during generation: ${error.message}`);
            } finally {
                resetUI();
            }
        }

        function cancelGeneration() {
            if (generator) {
                generator.cancel();
                showAlert('error', 'Cancelling generation...');
            }
        }

        function onProgress(progress) {
            const percentage = progress.percentage;
            document.getElementById('progressFill').style.width = percentage + '%';
            document.getElementById('progressText').textContent = 
                `${progress.current}/${progress.total} (${percentage}%)`;
        }

        function showStats() {
            if (!generator) return;

            const stats = generator.getStatistics();
            if (!stats) return;

            let html = '<h3 style="margin-bottom: 15px; color: #333;">Dataset Statistics</h3>';
            
            html += `<div class="stat-item">
                <span class="stat-label">Total launches:</span>
                <span class="stat-value">${stats.count.toLocaleString()}</span>
            </div>`;

            html += `<div class="stat-item">
                <span class="stat-label">Max Altitude (avg):</span>
                <span class="stat-value">${stats.maxAltitude.avg.toFixed(1)} m</span>
            </div>
            <div class="stat-item" style="padding-left: 20px; font-size: 12px; color: #999;">
                <span>Range: ${stats.maxAltitude.min.toFixed(1)} - ${stats.maxAltitude.max.toFixed(1)} m</span>
            </div>`;

            html += `<div class="stat-item">
                <span class="stat-label">Flight Time (avg):</span>
                <span class="stat-value">${stats.flightTime.avg.toFixed(1)} s</span>
            </div>
            <div class="stat-item" style="padding-left: 20px; font-size: 12px; color: #999;">
                <span>Range: ${stats.flightTime.min.toFixed(1)} - ${stats.flightTime.max.toFixed(1)} s</span>
            </div>`;

            html += `<div class="stat-item">
                <span class="stat-label">Max Velocity (avg):</span>
                <span class="stat-value">${stats.maxVelocity.avg.toFixed(1)} m/s</span>
            </div>
            <div class="stat-item" style="padding-left: 20px; font-size: 12px; color: #999;">
                <span>Range: ${stats.maxVelocity.min.toFixed(1)} - ${stats.maxVelocity.max.toFixed(1)} m/s</span>
            </div>`;

            html += `<div class="stat-item">
                <span class="stat-label">Landing Distance (avg):</span>
                <span class="stat-value">${Math.abs(stats.landingX.avg).toFixed(1)} m</span>
            </div>
            <div class="stat-item" style="padding-left: 20px; font-size: 12px; color: #999;">
                <span>Range: ${Math.abs(stats.landingX.min).toFixed(1)} - ${Math.abs(stats.landingX.max).toFixed(1)} m</span>
            </div>`;

            document.getElementById('statsContainer').innerHTML = html;
            document.getElementById('statsContainer').style.display = 'block';
        }

        function downloadMainDataset() {
            if (!generator || generator.dataset.length === 0) {
                showAlert('error', 'No dataset available');
                return;
            }

            const csv = generator.exportAsCSV();
            downloadFile(csv, 'rocket_dataset_main.csv');
        }

        function downloadTrajectories() {
            if (!generator || generator.dataset.length === 0) {
                showAlert('error', 'No dataset available');
                return;
            }

            const csv = generator.exportTrajectoriesAsCSV();
            downloadFile(csv, 'rocket_dataset_trajectories.csv');
        }

        function downloadFile(content, filename) {
            const blob = new Blob([content], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            
            link.setAttribute('href', url);
            link.setAttribute('download', filename);
            link.style.visibility = 'hidden';
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            showAlert('success', `✅ Downloaded: ${filename}`);
        }

        function showAlert(type, message) {
            const successAlert = document.getElementById('alertSuccess');
            const errorAlert = document.getElementById('alertError');

            if (type === 'success') {
                successAlert.textContent = message;
                successAlert.style.display = 'block';
                errorAlert.style.display = 'none';
            } else {
                errorAlert.textContent = message;
                errorAlert.style.display = 'block';
                successAlert.style.display = 'none';
            }
        }

        function hideAlerts() {
            document.getElementById('alertSuccess').style.display = 'none';
            document.getElementById('alertError').style.display = 'none';
        }

        function resetUI() {
            document.getElementById('btnGenerate').disabled = false;
            document.getElementById('btnCancel').style.display = 'none';
            document.getElementById('progressContainer').style.display = 'none';
        }
    </script>
</body>
</html>
